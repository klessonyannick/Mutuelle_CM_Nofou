{% extends "base.html" %}

{% block content %}

<style>

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* CARD */
.card{
    background:#111;
    padding:30px;
    border-radius:15px;
    width:320px;
    text-align:center;
    color:white;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* TITLE */
.card h2{
    margin-bottom:15px;
    color:#00e676;
}

/* INPUT */
.card input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    background:#1e1e1e;
    color:white;
}

/* BUTTON */
.card button{
    width:100%;
    padding:10px;
    background:#00e676;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.card button:hover{
    transform:scale(1.05);
}

/* ERROR */
.error{
    color:red;
    margin-top:10px;
}

/* SUCCESS */
.success{
    color:#00e676;
    margin-top:10px;
}

/* BACK */
.back{
    display:block;
    margin-top:15px;
    color:#00e5ff;
    text-decoration:none;
}

.back:hover{
    text-decoration:underline;
}

</style>

<div class="card">

<h2>🔐 Changer mot de passe</h2>

<form method="post">

    <input 
        type="password" 
        name="old_password" 
        placeholder="Ancien mot de passe"
        required
    >

    <input 
        type="password" 
        id="new_password"
        name="new_password" 
        placeholder="Nouveau mot de passe"
        required
    >

    <input 
        type="password" 
        id="confirm_password"
        name="confirm_password" 
        placeholder="Confirmer mot de passe"
        required
    >

    <button type="submit">Modifier</button>

</form>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

{% if success %}
<p class="success">{{ success }}</p>
{% endif %}

<a href="{{ url_for('dashboard') }}" class="back">⬅ Retour</a>

</div>

<script>

// vérification JS simple
let newPass = document.getElementById("new_password");
let confirmPass = document.getElementById("confirm_password");

function checkMatch(){
    if(confirmPass.value && newPass.value !== confirmPass.value){
        confirmPass.style.border = "2px solid red";
    } else {
        confirmPass.style.border = "none";
    }
}

newPass.addEventListener("input", checkMatch);
confirmPass.addEventListener("input", checkMatch);

</script>

{% endblock %}
