{% extends "base.html" %}

{% block content %}

<style>

/* PAGE */
.container {
    max-width: 600px;
    margin: auto;
    padding: 30px;
    text-align: center;
}

/* TITRE */
h2 {
    color: #ff5252;
    margin-bottom: 20px;
}

/* CARD */
.card {
    background: #111;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* NOM */
.name {
    font-weight: bold;
}

/* BOUTONS */
.actions a {
    margin-left: 10px;
    padding: 6px 10px;
    border-radius: 6px;
    text-decoration: none;
    font-size: 14px;
}

/* RESTORE */
.restore {
    background: #00e676;
    color: black;
}

.restore:hover {
    background: #00c853;
}

/* BACK */
.back {
    display: inline-block;
    margin-top: 20px;
    padding: 10px;
    border: 1px solid #00e5ff;
    border-radius: 8px;
    color: #00e5ff;
    text-decoration: none;
}

.back:hover {
    background: #00e5ff;
    color: black;
}

/* EMPTY */
.empty {
    color: #aaa;
    margin-top: 20px;
}

</style>

<div class="container">

<h2>🗑️ Membres supprimés</h2>

{% if members %}
    {% for m in members %}
    <div class="card">
        <div class="name">{{ m.name }}</div>

        <div class="actions">
            <a href="{{ url_for('restore', id=m.id) }}" class="restore">
                ♻️ Restaurer
            </a>
        </div>
    </div>
    {% endfor %}
{% else %}
    <p class="empty">Aucun membre supprimé</p>
{% endif %}

<a href="{{ url_for('dashboard') }}" class="back">⬅ Retour</a>

</div>

{% endblock %}
