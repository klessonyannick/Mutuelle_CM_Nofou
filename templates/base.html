<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mutuelle</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS GLOBAL -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>

/* GLOBAL */
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 25px;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    position: relative;
}

/* LOGO */
.logo {
    font-weight: bold;
    font-size: 20px;
    animation: glow 2s infinite alternate;
}

/* GLOW */
@keyframes glow {
    from { text-shadow: 0 0 5px #fff; }
    to { text-shadow: 0 0 20px #00e676; }
}

/* NAV */
.nav a {
    margin: 0 10px;
    text-decoration: none;
    color: white;
    padding: 8px 12px;
    border-radius: 8px;
    transition: 0.3s;
}

.nav a:hover {
    background: rgba(255,255,255,0.2);
}

/* MENU MOBILE */
.menu-toggle {
    display: none;
    font-size: 22px;
    cursor: pointer;
}

/* MOBILE */
@media(max-width:768px){
    .menu-toggle {
        display: block;
    }

    .nav {
        display: none;
        flex-direction: column;
        background: #111;
        position: absolute;
        top: 60px;
        right: 0;
        width: 200px;
        padding: 10px;
        border-radius: 10px;
    }

    .nav.show {
        display: flex;
    }
}

/* CONTAINER */
.container {
    padding: 20px;
}

/* TOAST */
#toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #00e676;
    color: black;
    padding: 12px 18px;
    border-radius: 10px;
    display: none;
    font-weight: bold;
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
}

/* BUTTON GLOBAL */
button {
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

    </style>
</head>

<body>

{% if session.user %}
<div class="header">

    <div class="logo">💰 Mutuelle CI</div>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <div class="nav" id="nav">

        <a href="{{ url_for('dashboard') }}">🏠 Accueil</a>

        {% if session.role == "admin" %}
            <a href="{{ url_for('create_user') }}">👤 Utilisateur</a>
        {% endif %}

        <a href="{{ url_for('change_password') }}">🔐 Mot de passe</a>
        <a href="{{ url_for('logout') }}">🚪 Déconnexion</a>

    </div>

</div>
{% endif %}

<div class="container">
    {% block content %}{% endblock %}
</div>

<!-- 🔔 TOAST -->
<div id="toast"></div>

<!-- JS GLOBAL -->
<script>

// MENU MOBILE
function toggleMenu(){
    document.getElementById("nav").classList.toggle("show");
}

// TOAST GLOBAL
function showToast(msg){
    let t = document.getElementById("toast");
    t.innerText = msg;
    t.style.display = "block";

    setTimeout(()=> {
        t.style.display="none";
    }, 3000);
}

</script>

</body>
</html>
