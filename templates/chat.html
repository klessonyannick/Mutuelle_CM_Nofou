{% extends "base.html" %}

{% block content %}

<style>
body{
    color:white;
    font-family:Arial;
}

/* BOX */
.chat-box{
    max-width:600px;
    margin:auto;
    background:#111;
    padding:15px;
    border-radius:15px;
}

/* MESSAGES */
.messages{
    max-height:400px;
    overflow-y:auto;
    margin-bottom:10px;
}

/* MESSAGE */
.message{
    margin:10px;
    padding:10px;
    border-radius:10px;
}

/* MON MESSAGE */
.me{
    background:#00e676;
    color:black;
    text-align:right;
}

/* AUTRES */
.other{
    background:#333;
}

/* FORM */
form{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:10px;
    border-radius:8px;
    border:none;
}

button{
    padding:10px;
    border:none;
    border-radius:8px;
    background:#00e676;
    cursor:pointer;
}

button:hover{
    background:#00c853;
}

/* BACK */
.back{
    display:block;
    text-align:center;
    margin-top:10px;
    color:#00e676;
}
</style>

<div class="chat-box">

<h2 style="text-align:center;">💬 Chat</h2>

<div class="messages" id="messages">

{% for m in messages %}
<div class="message {% if m.sender == session.user %}me{% else %}other{% endif %}">
    <b>{{ m.sender }}</b><br>
    {{ m.content }}
</div>
{% endfor %}

</div>

<form method="post">
    <input name="message" placeholder="Écris ton message..." required>
    <button type="submit">Envoyer</button>
</form>

<a href="{{ url_for('dashboard') }}" class="back">⬅ Retour</a>

</div>

<!-- AUTO SCROLL -->
<script>
let box = document.getElementById("messages");
box.scrollTop = box.scrollHeight;
</script>

{% endblock %}
